name: 🔐 StaticCrypt 암호화 & GitHub Pages 배포

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  encrypt-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: StaticCrypt 암호화
        run: |
          mkdir -p dist
          npx staticrypt index.html \
            -p "${{ secrets.SITE_PASSWORD }}" \
            -d ./dist \
            --no-remember \
            --short
          find . -maxdepth 1 -name "*.json" -exec cp {} ./dist/ \;

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
