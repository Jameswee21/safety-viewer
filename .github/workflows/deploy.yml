name: 🔐 GitHub Pages 배포 (데이터 암호화 내장)

# 데이터는 safety_local.html이 '뷰어 열람 비밀번호'로 AES-GCM 암호화하여
# index.html 안에 내장합니다. 따라서 별도 StaticCrypt 암호화나 data.json 배포가 불필요합니다.
# 이 워크플로는 index.html만 gh-pages로 배포하며, *.json은 절대 배포하지 않습니다.

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write             # gh-pages 브랜치 쓰기 권한

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: dist 준비 (index.html만 배포 · JSON 미배포)
        run: |
          mkdir -p dist
          cp index.html ./dist/
          # ⚠️ 보안: data.json 등 평문 JSON은 배포하지 않습니다.
          #         (데이터는 index.html 안에 암호화 내장됨)

      - name: GitHub Pages 배포 (gh-pages 브랜치)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true    # gh-pages를 항상 최신으로 교체 → 과거 data.json 잔존 제거
